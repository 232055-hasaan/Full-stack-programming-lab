<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 3 – Form Validation</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="card">
      <header>
        <h1>Create Account</h1>
        <p class="subtitle">All fields are required</p>
      </header>

      <div id="successMsg" style="display:none;">
        <div class="success-icon">✓</div>
        <h2>Account Created!</h2>
        <p>Welcome aboard. Your registration was successful.</p>
      </div>

      <div id="formWrap">
        <div class="field-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe"/>
          <span class="error-msg" id="nameErr"></span>
        </div>

        <div class="field-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com"/>
          <span class="error-msg" id="emailErr"></span>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 8 characters"/>
          <span class="error-msg" id="passwordErr"></span>
        </div>

        <div class="field-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Repeat password"/>
          <span class="error-msg" id="confirmErr"></span>
        </div>

        <button id="submitBtn">Create Account</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
