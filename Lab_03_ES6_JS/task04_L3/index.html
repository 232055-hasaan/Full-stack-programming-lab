<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Registration System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <div class="container">

    <header>
      <div class="header-label">// Lab Task 04 — JavaScript Set</div>
      <h1 class="title">COURSE<br /><span>REGISTRY</span></h1>
      <p class="subtitle">Unique course tracking powered by JavaScript <code>Set</code></p>
    </header>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="statUnique">0</div>
        <div class="stat-lbl">Unique Courses<br /><small>Set.size</small></div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statAttempts">0</div>
        <div class="stat-lbl">Total Attempts</div>
      </div>
      <div class="stat-box accent-stat">
        <div class="stat-num" id="statDups">0</div>
        <div class="stat-lbl">Duplicates Blocked</div>
      </div>
    </div>

    <section class="panel">
      <div class="panel-title">Register a Course</div>
      <div id="toast" class="toast" aria-live="polite"></div>
      <div class="input-row">
        <input type="text" id="courseInput" placeholder="Type course name…" autocomplete="off" />
        <button class="btn" id="addBtn">+ Add</button>
      </div>
      <div class="quick-section">
        <span class="quick-label">Quick Add →</span>
        <div class="chips" id="presetChips"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">Registered Courses &nbsp;<span class="size-badge" id="sizeBadge">Set.size = 0</span></div>
      <div class="courses-grid" id="coursesGrid">
        <div class="empty-msg">No courses yet. Add one above.</div>
      </div>
    </section>

    <section class="panel code-panel" id="forOfPanel" style="display:none;">
      <div class="panel-title">for…of Loop Output</div>
      <pre id="forOfOutput" class="code-block"></pre>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
