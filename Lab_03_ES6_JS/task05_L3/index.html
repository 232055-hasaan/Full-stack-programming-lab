<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalog — Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="header-tag">// Lab Task 05 — JavaScript Map</span>
        <h1 class="site-title">Product<em>Catalog</em></h1>
      </div>
      <div class="header-right">
        <div class="total-chip">
          <span class="total-icon">▣</span>
          <span id="totalLabel">5 Products in Map</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Toolbar -->
    <div class="toolbar">

      <!-- Add Product -->
      <div class="card tool-card">
        <h2 class="card-heading"><span class="heading-dot add-dot"></span>Add Product</h2>
        <div class="field">
          <label for="pId">Product ID</label>
          <input type="text" id="pId" placeholder="e.g. P006" />
        </div>
        <div class="field">
          <label for="pName">Product Name</label>
          <input type="text" id="pName" placeholder="Enter product name" />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="pCat">Category</label>
            <select id="pCat">
              <option>Electronics</option>
              <option>Clothing</option>
              <option>Books</option>
              <option>Food &amp; Grocery</option>
              <option>Sports</option>
              <option>Home &amp; Living</option>
              <option>Beauty</option>
            </select>
          </div>
          <div class="field">
            <label for="pStock">Stock</label>
            <input type="number" id="pStock" placeholder="0" min="0" />
          </div>
        </div>
        <div class="field">
          <label for="pPrice">Price (PKR)</label>
          <input type="number" id="pPrice" placeholder="0.00" min="0" step="0.01" />
        </div>
        <button class="btn btn-primary" id="addBtn">Map.set() → Add Product</button>
        <div id="addMsg" class="msg" aria-live="polite"></div>
      </div>

      <!-- Search & Delete -->
      <div class="card tool-card">
        <h2 class="card-heading"><span class="heading-dot search-dot"></span>Search by ID</h2>
        <div class="field">
          <label for="searchId">Product ID</label>
          <input type="text" id="searchId" placeholder="Enter ID to search…" />
        </div>
        <button class="btn btn-search" id="searchBtn">Map.get() → Search</button>
        <div id="searchResult" class="search-result" aria-live="polite"></div>

        <div class="divider"></div>

        <h2 class="card-heading"><span class="heading-dot del-dot"></span>Delete Product</h2>
        <div class="field">
          <label for="deleteId">Product ID</label>
          <input type="text" id="deleteId" placeholder="Enter ID to delete…" />
        </div>
        <button class="btn btn-danger" id="deleteBtn">Map.delete() → Remove</button>
        <div id="deleteMsg" class="msg" aria-live="polite"></div>
      </div>

    </div>

    <!-- Product Grid -->
    <section class="products-section">
      <div class="section-header">
        <h2 class="section-title">All Products</h2>
        <span class="map-note">Stored in <code>Map&lt;ID, Product&gt;</code></span>
      </div>
      <div class="products-grid" id="productsGrid"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
